<div class="lending-page">
  <section class="panel">
    <h2>Loan a Book</h2>
    <p class="hint">Enter the member's username and the book's ISBN.</p>
    <form [formGroup]="loanForm" (ngSubmit)="submitLoan()">
      <div class="field">
        <label for="loan-username">Username</label>
        <input pInputText id="loan-username" formControlName="username" />
      </div>
      <div class="field">
        <label for="loan-isbn">ISBN</label>
        <input pInputText id="loan-isbn" formControlName="isbn" />
      </div>
      <button pButton type="submit" label="Loan Out" [loading]="loaning()"></button>
    </form>
  </section>

  <section class="panel">
    <h2>Return a Book</h2>
    <p class="hint">Enter the member's username and the book's ISBN.</p>
    <form [formGroup]="returnForm" (ngSubmit)="submitReturn()">
      <div class="field">
        <label for="return-username">Username</label>
        <input pInputText id="return-username" formControlName="username" />
      </div>
      <div class="field">
        <label for="return-isbn">ISBN</label>
        <input pInputText id="return-isbn" formControlName="isbn" />
      </div>
      <button pButton type="submit" label="Return" [loading]="returning()"></button>
    </form>
  </section>

  <section class="panel">
    <h2>Authorise Payment</h2>
    <p class="hint">Clears every pending payment for this member, up to the given amount.</p>
    <form [formGroup]="paymentForm" (ngSubmit)="submitAuthorise()">
      <div class="field">
        <label for="payment-username">Username</label>
        <input pInputText id="payment-username" formControlName="username" />
      </div>
      <div class="field">
        <label for="payment-amount">Amount</label>
        <p-inputNumber inputId="payment-amount" formControlName="amount" mode="currency" currency="USD" />
      </div>
      <button pButton type="submit" label="Authorise" [loading]="authorising()"></button>
    </form>
  </section>
</div>
